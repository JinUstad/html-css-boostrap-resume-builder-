<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
<style>
    body {
        font-family: 'Quicksand';
        background-color: gray;
    }

    #main-page {
        background-color: white;
    }

    .skills li {
        display: inline;
        text-decoration: none;
        list-style-type: none;
        background-color: whitesmoke;
        color: black;
        border: 1px solid rgb(235 235 235);
        border-radius: 5px;
        font-size: 20px;
        margin-left: 10px;
        padding: 0px;
    }



    .projects li {
        text-decoration: none;
        list-style-type: none;
        font-size: 20px;
    }

    h3 {
        font-weight: 800;
    }

    p {
        font-size: 20px;
    }

    .fa-code {
        color: teal;
        margin-right: 10px;
    }
</style>

<body>
    <div class="container  my-5 p-5" id="main-page">
        <h1>Resume Builder</h1>
        <!-- <button class="btn btn-sm btn-warning" onclick="autoFillForm()">Auto Fill</button> -->
        <div class="form-group">
            <label for="Name">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="Enter Full Name">
        </div>

        <div class="form-group">
            <label for="Name">Profession </label>
            <input type="text" class="form-control" id="profession" placeholder="Enter your profession">
        </div>

        <div class="form-group">
            <label for="Name">Email </label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email address">
        </div>


        <div class="form-group">
            <label for="Name">Phone Number </label>
            <input type="number" class="form-control" id="phone" placeholder="Enter your phone number">
        </div>


        <div class="form-group">
            <label for="Name">Website </label>
            <input type="text" class="form-control" id="webiste" placeholder="Enter your website (Optional)">
        </div>

        <div class="form-group">
            <label for="Name">Career Objective</label>
            <textarea name="" id="careerObjective" rows="5" class="form-control"
                placeholder="Career Objective"></textarea>
        </div>

        <div class="form-group">
            <label for="Name">Skills </label>
            <input type="text" class="form-control" id="skills" placeholder="Please enter your skills">
            <small class="text-muted">Please enter comma sperated skills for example :- Java, Javascript, PHP,
                Swift</small>
        </div>

        <div class="form-group">
            <label for="Name">Projects </label>
            <input type="text" class="form-control" id="projects" placeholder="Please enter your projects">
            <small class="text-muted">Please enter comma sperated projects for example :- pro1, pro2, pro3, pro4</small>
        </div>


        <!-- Qualification -->
        <hr>
        <h4>Your Highest Qualification</h4>
        <div class="form-group">
            <label for="Name">University Name </label>
            <input type="text" class="form-control" id="university" placeholder="Please enter your university name">
        </div>
        <div class="form-group">
            <label for="Name">Course Name </label>
            <input type="text" class="form-control" id="course" placeholder="Please enter your course name">
        </div>

        <div class="form-group">
            <label for="Name">Year of passing</label>
            <input type="text" class="form-control" id="passingDate" placeholder="Please enter year of passing">
        </div>
        <button class="btn btn-success rounded-0 w-100 my-5" onclick="onFinalSubmission()">Submit</button>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
    <script src="./script.js"></script>

</html>
